<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ميزان المراجعة - النظام المحاسبي</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <div class="logo">⚖️ <span>النظام</span> المحاسبي</div>
  <ul class="nav-links">
    <li><a href="index.html">📝 <span>القيود</span></a></li>
    <li><a href="trial-balance.html" class="active">📊 <span>ميزان المراجعة</span></a></li>
    <li><a href="income-statement.html">📈 <span>قائمة الدخل</span></a></li>
    <li><a href="balance-sheet.html">🏦 <span>الميزانية</span></a></li>
    <li><a href="dashboard.html">🖥️ <span>الداشبورد</span></a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📊 ميزان المراجعة</h1>
    <p>ملخص أرصدة جميع الحسابات — يجب أن يتساوى إجمالي المدين مع إجمالي الدائن</p>
  </div>

  <!-- Filters -->
  <div class="card" style="margin-bottom:1.5rem">
    <div class="form-grid">
      <div class="form-group">
        <label>📅 من تاريخ</label>
        <input type="date" id="dateFrom" onchange="renderTrialBalance()" />
      </div>
      <div class="form-group">
        <label>📅 إلى تاريخ</label>
        <input type="date" id="dateTo" onchange="renderTrialBalance()" />
      </div>
      <div class="form-group">
        <label>🔍 تصفية حسب النوع</label>
        <select id="typeFilter" onchange="renderTrialBalance()">
          <option value="all">جميع الأنواع</option>
          <option value="asset">أصول</option>
          <option value="liability">التزامات</option>
          <option value="equity">حقوق الملكية</option>
          <option value="expense">مصروفات</option>
          <option value="revenue">إيرادات</option>
        </select>
      </div>
      <div class="form-group" style="justify-content:flex-end;flex-direction:row;align-items:flex-end;gap:0.5rem">
        <button class="btn btn-ghost" onclick="resetFilters()">↺ إعادة تعيين</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsRow"></div>

  <!-- Balance Status -->
  <div id="balanceStatus" style="margin-bottom:1rem"></div>

  <!-- Table -->
  <div class="card">
    <div class="card-title">📋 تفاصيل الأرصدة</div>
    <div class="table-wrap">
      <table id="tbTable">
        <thead>
          <tr>
            <th>#</th>
            <th>كود الحساب</th>
            <th>اسم الحساب</th>
            <th>النوع</th>
            <th>إجمالي المدين</th>
            <th>إجمالي الدائن</th>
            <th>الرصيد</th>
          </tr>
        </thead>
        <tbody id="tbBody"></tbody>
        <tfoot id="tbFoot"></tfoot>
      </table>
    </div>
    <div id="emptyState"></div>
  </div>
</div>

<script src="accounts.js"></script>
<script>
  window.onload = () => {
    // Default: current month
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    document.getElementById('dateFrom').value = new Date(y, m, 1).toISOString().split('T')[0];
    document.getElementById('dateTo').value = new Date(y, m + 1, 0).toISOString().split('T')[0];
    renderTrialBalance();
  };

  function resetFilters() {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    document.getElementById('typeFilter').value = 'all';
    renderTrialBalance();
  }

  function renderTrialBalance() {
    let entries = loadEntries();
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    const typeFilter = document.getElementById('typeFilter').value;

    if (from) entries = entries.filter(e => e.date >= from);
    if (to) entries = entries.filter(e => e.date <= to);

    // Aggregate by account code
    const map = {};
    entries.forEach(entry => {
      entry.lines.forEach(line => {
        if (!map[line.code]) {
          map[line.code] = { code: line.code, name: line.name, type: line.type, debit: 0, credit: 0 };
        }
        map[line.code].debit += line.debit;
        map[line.code].credit += line.credit;
      });
    });

    let rows = Object.values(map).sort((a, b) => a.code.localeCompare(b.code));
    if (typeFilter !== 'all') rows = rows.filter(r => r.type === typeFilter);

    // Stats
    const totalD = rows.reduce((s, r) => s + r.debit, 0);
    const totalC = rows.reduce((s, r) => s + r.credit, 0);
    const isBalanced = Math.abs(totalD - totalC) < 0.01;

    // Render stats
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card gold">
        <div class="stat-label">إجمالي المدين</div>
        <div class="stat-value gold">${fmt(totalD)}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">إجمالي الدائن</div>
        <div class="stat-value blue">${fmt(totalC)}</div>
      </div>
      <div class="stat-card ${isBalanced ? 'green' : 'red'}">
        <div class="stat-label">الفرق</div>
        <div class="stat-value ${isBalanced ? 'green' : 'red'}">${fmt(Math.abs(totalD - totalC))}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">عدد الحسابات</div>
        <div class="stat-value blue">${rows.length}</div>
      </div>
    `;

    // Balance status
    document.getElementById('balanceStatus').innerHTML = isBalanced
      ? `<div class="alert alert-success">✅ الميزان متوازن — إجمالي المدين يساوي إجمالي الدائن</div>`
      : `<div class="alert alert-error">⚠️ الميزان غير متوازن — الفرق: EGP ${fmt(Math.abs(totalD - totalC))}</div>`;

    if (rows.length === 0) {
      document.getElementById('tbBody').innerHTML = '';
      document.getElementById('tbFoot').innerHTML = '';
      document.getElementById('emptyState').innerHTML = `<div class="empty-state"><div class="icon">📊</div><h3>لا توجد بيانات</h3><p>لم يتم إدخال قيود بعد أو لا توجد نتائج للفلتر المحدد</p></div>`;
      return;
    }
    document.getElementById('emptyState').innerHTML = '';

    const typeMap = { asset: 'أصول', liability: 'التزامات', equity: 'حقوق الملكية', expense: 'مصروفات', revenue: 'إيرادات' };
    const typeBadge = { asset: 'badge-blue', liability: 'badge-red', equity: 'badge-gold', expense: 'badge-red', revenue: 'badge-green' };

    document.getElementById('tbBody').innerHTML = rows.map((r, i) => {
      const balance = r.debit - r.credit;
      return `<tr>
        <td style="color:var(--text2)">${i + 1}</td>
        <td><code style="color:var(--accent);font-size:0.82rem">${r.code}</code></td>
        <td style="font-weight:500">${r.name}</td>
        <td><span class="badge ${typeBadge[r.type] || 'badge-gold'}">${typeMap[r.type] || r.type}</span></td>
        <td style="color:var(--green);font-weight:600">${r.debit > 0 ? fmt(r.debit) : '—'}</td>
        <td style="color:var(--red);font-weight:600">${r.credit > 0 ? fmt(r.credit) : '—'}</td>
        <td style="font-weight:700;color:${balance >= 0 ? 'var(--green)' : 'var(--red)'}">
          ${balance >= 0 ? '' : '-'}${fmt(Math.abs(balance))}
        </td>
      </tr>`;
    }).join('');

    document.getElementById('tbFoot').innerHTML = `
      <tr class="tfoot-row">
        <td colspan="4" style="text-align:right">الإجمالي العام</td>
        <td>${fmt(totalD)}</td>
        <td>${fmt(totalC)}</td>
        <td style="color:${isBalanced ? 'var(--green)' : 'var(--red)'}">${fmt(Math.abs(totalD - totalC))}</td>
      </tr>`;
  }
</script>
</body>
</html>
