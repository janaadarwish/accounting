<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trial Balance - Accounting System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <div class="logo">⚖️ <span>Accounting</span> System</div>
  <ul class="nav-links">
    <li><a href="index.html">📝 <span>Entries</span></a></li>
    <li><a href="trial-balance.html" class="active">📊 <span>Trial Balance</span></a></li>
    <li><a href="income-statement.html">📈 <span>Income Statement</span></a></li>
    <li><a href="balance-sheet.html">🏦 <span>Balance Sheet</span></a></li>
    <li><a href="dashboard.html">🖥️ <span>Dashboard</span></a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📊 Trial Balance</h1>
    <p>Summary of all account balances — Total Debits must equal Total Credits</p>
  </div>

  <div class="card" style="margin-bottom:1.5rem">
    <div class="form-grid">
      <div class="form-group">
        <label>📅 From Date</label>
        <input type="date" id="dateFrom" onchange="renderTrialBalance()" />
      </div>
      <div class="form-group">
        <label>📅 To Date</label>
        <input type="date" id="dateTo" onchange="renderTrialBalance()" />
      </div>
      <div class="form-group">
        <label>🔍 Filter by Type</label>
        <select id="typeFilter" onchange="renderTrialBalance()">
          <option value="all">All Types</option>
          <option value="asset">Assets</option>
          <option value="liability">Liabilities</option>
          <option value="equity">Equity</option>
          <option value="expense">Expenses</option>
          <option value="revenue">Revenue</option>
        </select>
      </div>
      <div class="form-group" style="justify-content:flex-end;flex-direction:row;align-items:flex-end;gap:0.5rem">
        <button class="btn btn-ghost" onclick="resetFilters()">↺ Reset</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
  </div>

  <div class="stats-grid" id="statsRow"></div>

  <div id="balanceStatus" style="margin-bottom:1rem"></div>

  <div class="card">
    <div class="card-title">📋 Balance Details</div>
    <div class="table-wrap">
      <table id="tbTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Account Code</th>
            <th>Account Name</th>
            <th>Type</th>
            <th>Total Debit</th>
            <th>Total Credit</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody id="tbBody"></tbody>
        <tfoot id="tbFoot"></tfoot>
      </table>
    </div>
    <div id="emptyState"></div>
  </div>
</div>

<script src="accounts.js"></script>
<script>
  window.onload = () => {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    document.getElementById('dateFrom').value = new Date(y, m, 1).toISOString().split('T')[0];
    document.getElementById('dateTo').value = new Date(y, m + 1, 0).toISOString().split('T')[0];
    renderTrialBalance();
  };

  function resetFilters() {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    document.getElementById('typeFilter').value = 'all';
    renderTrialBalance();
  }

  function renderTrialBalance() {
    let entries = loadEntries();
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    const typeFilter = document.getElementById('typeFilter').value;

    if (from) entries = entries.filter(e => e.date >= from);
    if (to) entries = entries.filter(e => e.date <= to);

    const map = {};
    // entries.forEach(entry => {
    //   entry.lines.forEach(line => {
    //     if (!map[line.code]) {
    //       map[line.code] = { code: line.code, name: line.name, type: line.type, debit: 0, credit: 0 };
    //     }
    //     map[line.code].debit += (parseFloat(line.debit) || 0);
    //     map[line.code].credit += (parseFloat(line.credit) || 0);
    //   });
    // });
    // 
    entries.forEach(entry => {
      entry.lines.forEach(line => {
        const acc = getAccount(line.code); 
        if (!map[line.code]) {
          map[line.code] = { 
        code: line.code, 
        name: acc?.name || "Unknown", 
        type: acc?.type || "unknown", 
        debit: 0, 
        credit: 0 
      };
    }

    map[line.code].debit += (parseFloat(line.debit) || 0);
    map[line.code].credit += (parseFloat(line.credit) || 0);
  });
});
    let rows = Object.values(map).sort((a, b) => a.code.localeCompare(b.code));
    if (typeFilter !== 'all') rows = rows.filter(r => r.type === typeFilter);

    const totalD = Math.round(rows.reduce((s, r) => s + r.debit, 0) * 100) / 100;
    const totalC = Math.round(rows.reduce((s, r) => s + r.credit, 0) * 100) / 100;
    const diff = Math.abs(totalD - totalC);
    const isBalanced = diff < 0.01;

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card gold">
        <div class="stat-label">Total Debit</div>
        <div class="stat-value gold">${fmt(totalD)}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Total Credit</div>
        <div class="stat-value blue">${fmt(totalC)}</div>
      </div>
      <div class="stat-card ${isBalanced ? 'green' : 'red'}">
        <div class="stat-label">Difference</div>
        <div class="stat-value ${isBalanced ? 'green' : 'red'}">${fmt(diff)}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Account Count</div>
        <div class="stat-value blue">${rows.length}</div>
      </div>
    `;

    document.getElementById('balanceStatus').innerHTML = isBalanced
      ? `<div class="alert alert-success">✅ Balanced — Total Debits equal Total Credits</div>`
      : `<div class="alert alert-error">⚠️ Out of Balance — Difference: EGP ${fmt(diff)}</div>`;

    if (rows.length === 0) {
      document.getElementById('tbBody').innerHTML = '';
      document.getElementById('tbFoot').innerHTML = '';
      document.getElementById('emptyState').innerHTML = `<div class="empty-state"><h3>No Data Found</h3><p>Try adjusting your filters or adding new entries.</p></div>`;
      return;
    }
    document.getElementById('emptyState').innerHTML = '';

    const typeMap = { asset: 'Asset', liability: 'Liability', equity: 'Equity', expense: 'Expense', revenue: 'Revenue' };
    const typeBadge = { asset: 'badge-blue', liability: 'badge-red', equity: 'badge-gold', expense: 'badge-red', revenue: 'badge-green' };

    document.getElementById('tbBody').innerHTML = rows.map((r, i) => {
      const balance = r.debit - r.credit;
      return `<tr>
        <td style="color:var(--text2)">${i + 1}</td>
        <td><code>${r.code}</code></td>
        <td style="font-weight:500">${r.name}</td>
        <td><span class="badge ${typeBadge[r.type] || 'badge-gold'}">${typeMap[r.type] || r.type}</span></td>
        <td style="color:var(--green);font-weight:600">${r.debit > 0 ? fmt(r.debit) : '—'}</td>
        <td style="color:var(--red);font-weight:600">${r.credit > 0 ? fmt(r.credit) : '—'}</td>
        <td style="font-weight:700;color:${balance >= 0 ? 'var(--green)' : 'var(--red)'}">
          ${balance >= 0 ? '' : '-'}${fmt(Math.abs(balance))}
        </td>
      </tr>`;
    }).join('');

    document.getElementById('tbFoot').innerHTML = `
      <tr class="tfoot-row">
        <td colspan="4" style="text-align:right">Grand Total</td>
        <td>${fmt(totalD)}</td>
        <td>${fmt(totalC)}</td>
        <td style="color:${isBalanced ? 'var(--green)' : 'var(--red)'}">${fmt(diff)}</td>
      </tr>`;
  }

  function fmt(num) {
    return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function loadEntries() {
    return JSON.parse(localStorage.getItem('journal_entries') || '[]');
  }
</script>
</body>
</html>
